# ─────────────────────────────────────────────────────────────
# Per-mind container fragments live in minds/<name>/container/compose.yaml.
# Each fragment is a complete Compose document with a single `services:` entry.
# Add one `- path:` line per mind below to wire it into the deployment.
# ─────────────────────────────────────────────────────────────
include:
  - path: minds/example/container/compose.yaml

services:
  # ─────────────────────────────────────────────────────────────
  # Gateway server — every client routes through this.
  # ─────────────────────────────────────────────────────────────
  server:
    build: .
    container_name: hive-mind-server
    working_dir: /usr/src/app
    volumes:
      - ${HOST_PROJECT_DIR:-.}:/usr/src/app
      - ${HOST_CLAUDE_DIR:-~/.claude}:/home/hivemind/.claude
      - ${HOST_CODEX_DIR:-~/.codex}:/home/hivemind/.codex
      - ${HOST_MCP_DIR}:/usr/src/mcp
    environment:
      - SESSIONS_DB_PATH=/usr/src/app/data/sessions.db
      - PYTHON_KEYRING_BACKEND=core.keyring_backend.HiveMindKeyring
      - PYTHONNOUSERSITE=1
      - KEY_RING=/usr/src/app/data/keyring
      - PYTHONPATH=/usr/src/app/vendor
    ports:
      - "8420:8420"
    restart: unless-stopped
    networks:
      - hivemind
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /home/hivemind:uid=1000,gid=1000
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    command: ["/opt/venv/bin/python3", "server.py"]

  # ─────────────────────────────────────────────────────────────
  # Voice server — STT + TTS for any surface that wants voice.
  # Port 8422 is published so bare-metal clients can reach it.
  # ─────────────────────────────────────────────────────────────
  voice-server:
    build:
      context: .
      dockerfile: Dockerfile.voice
    container_name: hive-mind-voice
    working_dir: /usr/src/app
    restart: always
    ports:
      - "8422:8422"
    networks:
      - hivemind
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ${HOST_PROJECT_DIR:-.}:/usr/src/app
      - whisper-cache:/home/hivemind/.cache
    environment:
      - WHISPER_MODEL=medium
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: ["/opt/venv/bin/python3", "-m", "voice.voice_server"]

  # Kokoro voice server -- fast, non-cloning TTS for minds that don't need a
  # cloned voice. Same module/STT as voice-server, selected via TTS_ENGINE.
  # Reachable in-network at http://voice-server-kokoro:8422, host port 8423.
  # Point a mind's VOICE_SERVER_URL here instead of voice-server to use it.
  voice-server-kokoro:
    build:
      context: .
      dockerfile: Dockerfile.voice.kokoro
    container_name: hive-mind-voice-kokoro
    working_dir: /usr/src/app
    restart: always
    ports:
      - "8423:8422"
    networks:
      - hivemind
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ${HOST_PROJECT_DIR:-.}:/usr/src/app
      - kokoro-cache:/home/hivemind/.cache
    environment:
      - WHISPER_MODEL=medium
      - TTS_ENGINE=kokoro
      - KOKORO_DEFAULT_VOICE=${KOKORO_DEFAULT_VOICE:-af_heart}
      # Optional per-mind voice overrides, JSON: {"ada":"af_bella","bob":"am_michael"}
      - KOKORO_VOICE_MAP=${KOKORO_VOICE_MAP:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: ["/opt/venv/bin/python3", "-m", "voice.voice_server"]

  # ─────────────────────────────────────────────────────────────
  # Example Telegram bot.
  # Duplicate this block per mind. Set MIND_ID to the mind's id and
  # TELEGRAM_BOT_TOKEN_KEYRING_KEY to the keyring entry holding that
  # mind's bot token.
  # ─────────────────────────────────────────────────────────────
  telegram-bot:
    build: .
    container_name: hive-mind-telegram
    working_dir: /usr/src/app
    volumes:
      - ${HOST_PROJECT_DIR:-.}:/usr/src/app
      - ${HOST_CLAUDE_DIR:-~/.claude}:/home/hivemind/.claude
    restart: unless-stopped
    depends_on:
      - server
      - voice-server
    networks:
      - hivemind
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    environment:
      - HIVE_MIND_SERVER_URL=http://server:8420
      - VOICE_SERVER_URL=http://voice-server:8422
      - PYTHON_KEYRING_BACKEND=core.keyring_backend.HiveMindKeyring
      - PYTHONNOUSERSITE=1
      - KEY_RING=/usr/src/app/data/keyring
      - MIND_ID=example
      - TELEGRAM_BOT_TOKEN_KEYRING_KEY=EXAMPLE_TELEGRAM_BOT_TOKEN
    command: ["/opt/venv/bin/python3", "-m", "bots.telegram_bot"]

  bilby-bot:
    build: .
    container_name: hive-mind-bilby-bot
    working_dir: /usr/src/app
    volumes:
      - ${HOST_PROJECT_DIR:-.}:/usr/src/app
    restart: unless-stopped
    depends_on:
      - server
      - voice-server
    networks:
      - hivemind
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    environment:
      - HIVE_MIND_SERVER_URL=http://server:8420
      - VOICE_SERVER_URL=http://voice-server:8422
      - PYTHON_KEYRING_BACKEND=core.keyring_backend.HiveMindKeyring
      - PYTHONNOUSERSITE=1
      - KEY_RING=/usr/src/app/data/keyring
      - MIND_ID=bilby
      - TELEGRAM_BOT_TOKEN_KEYRING_KEY=BILBY_TELEGRAM_BOT_TOKEN
    command: ["/opt/venv/bin/python3", "-m", "bots.telegram_bot"]

  # ─────────────────────────────────────────────────────────────
  # Example Discord bot.
  # ─────────────────────────────────────────────────────────────
  discord-bot:
    build: .
    container_name: hive-mind-discord
    working_dir: /usr/src/app
    volumes:
      - ${HOST_PROJECT_DIR:-.}:/usr/src/app
      - ${HOST_CLAUDE_DIR:-~/.claude}:/home/hivemind/.claude
    restart: unless-stopped
    depends_on:
      - server
      - voice-server
    networks:
      - hivemind
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    environment:
      - HIVE_MIND_SERVER_URL=http://server:8420
      - VOICE_SERVER_URL=http://voice-server:8422
      - PYTHON_KEYRING_BACKEND=core.keyring_backend.HiveMindKeyring
      - PYTHONNOUSERSITE=1
      - KEY_RING=/usr/src/app/data/keyring
      - MIND_ID=example
    command: ["/opt/venv/bin/python3", "-m", "bots.discord_bot"]

# Per-mind service definitions are pulled in via the `include:` block at the top of
# this file. See minds/example/container/compose.yaml for a fragment template.
# The /generate-compose skill scaffolds new fragments; wire each one into `include:`
# explicitly when you add it.

networks:
  hivemind:
    external: true
    name: hivemind

volumes:
  whisper-cache:
  kokoro-cache:
