services:
  # ─────────────────────────────────────────────────────────────
  # Gateway server — every client routes through this.
  # ─────────────────────────────────────────────────────────────
  server:
    build: .
    container_name: hive-mind-server
    working_dir: /usr/src/app
    volumes:
      - ${HOST_PROJECT_DIR:-.}:/usr/src/app
      - ${HOST_CLAUDE_DIR:-~/.claude}:/home/hivemind/.claude
      - ${HOST_CODEX_DIR:-~/.codex}:/home/hivemind/.codex
      - ${HOST_MCP_DIR}:/usr/src/mcp
    environment:
      - SESSIONS_DB_PATH=/usr/src/app/data/sessions.db
      - PYTHON_KEYRING_BACKEND=core.keyring_backend.HiveMindKeyring
      - PYTHONNOUSERSITE=1
      - KEY_RING=/usr/src/app/data/keyring
      - PYTHONPATH=/usr/src/app/vendor
    ports:
      - "8420:8420"
    restart: unless-stopped
    networks:
      - hivemind
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /home/hivemind:uid=1000,gid=1000
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    command: ["/opt/venv/bin/python3", "server.py"]

  # ─────────────────────────────────────────────────────────────
  # Voice server — STT + TTS for any surface that wants voice.
  # Port 8422 is published so bare-metal clients can reach it.
  # ─────────────────────────────────────────────────────────────
  voice-server:
    build:
      context: .
      dockerfile: Dockerfile.voice
    container_name: hive-mind-voice
    working_dir: /usr/src/app
    restart: always
    ports:
      - "8422:8422"
    networks:
      - hivemind
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ${HOST_PROJECT_DIR:-.}:/usr/src/app
      - whisper-cache:/home/hivemind/.cache
    environment:
      - WHISPER_MODEL=medium
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: ["/opt/venv/bin/python3", "-m", "voice.voice_server"]

  # ─────────────────────────────────────────────────────────────
  # Example Telegram bot.
  # Duplicate this block per mind. Set MIND_ID to the mind's id and
  # TELEGRAM_BOT_TOKEN_KEYRING_KEY to the keyring entry holding that
  # mind's bot token.
  # ─────────────────────────────────────────────────────────────
  telegram-bot:
    build: .
    container_name: hive-mind-telegram
    working_dir: /usr/src/app
    volumes:
      - ${HOST_PROJECT_DIR:-.}:/usr/src/app
      - ${HOST_CLAUDE_DIR:-~/.claude}:/home/hivemind/.claude
    restart: unless-stopped
    depends_on:
      - server
      - voice-server
    networks:
      - hivemind
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    environment:
      - HIVE_MIND_SERVER_URL=http://server:8420
      - VOICE_SERVER_URL=http://voice-server:8422
      - PYTHON_KEYRING_BACKEND=core.keyring_backend.HiveMindKeyring
      - PYTHONNOUSERSITE=1
      - KEY_RING=/usr/src/app/data/keyring
      - MIND_ID=example
      - TELEGRAM_BOT_TOKEN_KEYRING_KEY=EXAMPLE_TELEGRAM_BOT_TOKEN
    command: ["/opt/venv/bin/python3", "-m", "clients.telegram_bot"]

  # ─────────────────────────────────────────────────────────────
  # Example Discord bot.
  # ─────────────────────────────────────────────────────────────
  discord-bot:
    build: .
    container_name: hive-mind-discord
    working_dir: /usr/src/app
    volumes:
      - ${HOST_PROJECT_DIR:-.}:/usr/src/app
      - ${HOST_CLAUDE_DIR:-~/.claude}:/home/hivemind/.claude
    restart: unless-stopped
    depends_on:
      - server
      - voice-server
    networks:
      - hivemind
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    environment:
      - HIVE_MIND_SERVER_URL=http://server:8420
      - VOICE_SERVER_URL=http://voice-server:8422
      - PYTHON_KEYRING_BACKEND=core.keyring_backend.HiveMindKeyring
      - PYTHONNOUSERSITE=1
      - KEY_RING=/usr/src/app/data/keyring
      - MIND_ID=example
    command: ["/opt/venv/bin/python3", "-m", "clients.discord_bot"]

# BEGIN GENERATED MINDS
  # Example mind container. The /generate-compose skill replicates and
  # parameterizes this block for each registered mind based on its MIND.md.
  example:
    build: .
    container_name: hive-mind-example
    working_dir: /usr/src/app
    environment:
      - MIND_ID=example
      - CLAUDE_CONFIG_DIR=/home/hivemind/.claude-config
      - PYTHON_KEYRING_BACKEND=core.keyring_backend.HiveMindKeyring
      - PYTHONNOUSERSITE=1
      - PYTHONPATH=/usr/src/app/vendor
      - KEY_RING=/usr/src/app/data/keyring
    volumes:
      - ${HOST_PROJECT_DIR:-.}:/usr/src/app:rw
      - ${HOST_CLAUDE_DIR:-~/.claude}:/home/hivemind/.host-claude:ro
      - ${HOST_PROJECT_DIR:-.}/minds/example/.claude:/home/hivemind/.claude-config:rw
    restart: unless-stopped
    depends_on:
      - server
    networks:
      - hivemind
    tmpfs:
      - /tmp
    command: ["/opt/venv/bin/python3", "mind_server.py"]
# END GENERATED MINDS

networks:
  hivemind:
    external: true
    name: hivemind

volumes:
  whisper-cache:
