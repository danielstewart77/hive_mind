services:
  server:
    build: .
    container_name: hive-mind-server
    working_dir: /usr/src/app
    volumes:
      - ${HOST_PROJECT_DIR:-.}:/usr/src/app
      - ${HOST_CLAUDE_DIR:-~/.claude}:/home/hivemind/.claude
      - sessions-db:/usr/src/app/data
      - ${HOST_MCP_DIR:-/home/daniel/Storage/Dev/hive_mind_mcp}:/home/daniel/Storage/Dev/hive_mind_mcp
      - ${HOST_SPARK_DIR:-/home/daniel/Storage/Dev/spark_to_bloom}:/home/daniel/Storage/Dev/spark_to_bloom
      - ${HOST_CADDY_DIR:-/home/daniel/Storage/Dev/caddy}:/home/daniel/Storage/Dev/caddy
    environment:
      - SESSIONS_DB_PATH=/usr/src/app/data/sessions.db
      - PYTHON_KEYRING_BACKEND=keyrings.alt.file.PlaintextKeyring
      - XDG_DATA_HOME=/home/hivemind/.claude/data
    ports:
      - "8420:8420"
    restart: unless-stopped
    networks:
      - hivemind
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /home/hivemind:uid=1000,gid=1000
    # Gateway server — other services connect to this
    command: ["/opt/venv/bin/python3", "server.py"]

  discord-bot:
    build: .
    container_name: hive-mind-discord
    working_dir: /usr/src/app
    volumes:
      - ${HOST_PROJECT_DIR:-.}:/usr/src/app
      - ${HOST_CLAUDE_DIR:-~/.claude}:/home/hivemind/.claude
    restart: unless-stopped
    depends_on:
      - server
      - voice-server
    networks:
      - hivemind
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    environment:
      - HIVE_MIND_SERVER_URL=http://server:8420
      - VOICE_SERVER_URL=http://voice-server:8422
      - PYTHON_KEYRING_BACKEND=keyrings.alt.file.PlaintextKeyring
      - XDG_DATA_HOME=/home/hivemind/.claude/data
    command: ["/opt/venv/bin/python3", "-m", "clients.discord_bot"]

  voice-server:
    build: .
    container_name: hive-mind-voice
    working_dir: /usr/src/app
    restart: always
    networks:
      - hivemind
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ${HOST_PROJECT_DIR:-.}:/usr/src/app
      - whisper-cache:/home/hivemind/.cache
    environment:
      - WHISPER_MODEL=medium
      - XTTS_REF_AUDIO=/usr/src/app/voice_ref/hive_mind_voice.wav
      - XTTS_LANGUAGE=en
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: ["/opt/venv/bin/python3", "-m", "voice.voice_server"]

  telegram-bot:
    build: .
    container_name: hive-mind-telegram
    working_dir: /usr/src/app
    volumes:
      - ${HOST_PROJECT_DIR:-.}:/usr/src/app
      - ${HOST_CLAUDE_DIR:-~/.claude}:/home/hivemind/.claude
    restart: unless-stopped
    depends_on:
      - server
      - voice-server
    networks:
      - hivemind
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    environment:
      - HIVE_MIND_SERVER_URL=http://server:8420
      - VOICE_SERVER_URL=http://voice-server:8422
      - PYTHON_KEYRING_BACKEND=keyrings.alt.file.PlaintextKeyring
      - XDG_DATA_HOME=/home/hivemind/.claude/data
    command: ["/opt/venv/bin/python3", "-m", "clients.telegram_bot"]

  scheduler:
    build: .
    container_name: hive-mind-scheduler
    working_dir: /usr/src/app
    volumes:
      - ${HOST_CLAUDE_DIR:-~/.claude}:/home/hivemind/.claude
    restart: unless-stopped
    depends_on:
      - server
      - voice-server
    networks:
      - hivemind
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    environment:
      - HIVE_MIND_SERVER_URL=http://server:8420
      - VOICE_SERVER_URL=http://voice-server:8422
      - PYTHON_KEYRING_BACKEND=keyrings.alt.file.PlaintextKeyring
      - XDG_DATA_HOME=/home/hivemind/.claude/data
    command: ["/opt/venv/bin/python3", "-m", "clients.scheduler"]

  neo4j:
    image: neo4j:5.26-community
    container_name: hive-mind-neo4j
    restart: unless-stopped
    networks:
      - hivemind
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH:-neo4j/hivemind-memory}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    volumes:
      - neo4j-data:/data
    # No ports exposed — internal network only

  planka-db:
    image: postgres:14-alpine
    container_name: hive-mind-planka-db
    restart: unless-stopped
    networks:
      - hivemind
    environment:
      - POSTGRES_DB=planka
      - POSTGRES_USER=planka
      - POSTGRES_PASSWORD=${PLANKA_DB_PASSWORD:-planka}
    volumes:
      - planka-db:/var/lib/postgresql/data

  planka:
    image: ghcr.io/plankanban/planka:latest
    container_name: hive-mind-planka
    restart: unless-stopped
    depends_on:
      - planka-db
    networks:
      - hivemind
    environment:
      - BASE_URL=${PLANKA_BASE_URL:-http://localhost:3000}
      - DATABASE_URL=postgresql://planka:${PLANKA_DB_PASSWORD:-planka}@planka-db/planka
      - SECRET_KEY_BASE=${PLANKA_SECRET_KEY_BASE}
      - DEFAULT_ADMIN_EMAIL=${PLANKA_ADMIN_EMAIL:-admin@hivemind.local}
      - DEFAULT_ADMIN_PASSWORD=${PLANKA_ADMIN_PASSWORD:-changeme}
      - DEFAULT_ADMIN_NAME=${PLANKA_ADMIN_NAME:-Admin}
      - DEFAULT_ADMIN_USERNAME=${PLANKA_ADMIN_USERNAME:-admin}
    ports:
      - "3000:1337"
    volumes:
      - planka-data:/app/public/user-avatars
      - planka-data:/app/public/project-background-images
      - planka-data:/app/private/attachments

networks:
  hivemind:
    external: true
    name: hivemind

volumes:
  sessions-db:
  neo4j-data:
  planka-db:
  planka-data:
  whisper-cache:
