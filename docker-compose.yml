services:
  server:
    build: .
    container_name: hive-mind-server
    working_dir: /usr/src/app
    volumes:
      - .:/usr/src/app
      - ~/.claude:/home/hivemind/.claude
      - sessions-db:/usr/src/app/data
    environment:
      - SESSIONS_DB_PATH=/usr/src/app/data/sessions.db
    restart: unless-stopped
    networks:
      - hivemind
    # Gateway server — other services connect to this
    command: ["/opt/venv/bin/python3", "server.py"]

  discord-bot:
    build: .
    container_name: hive-mind-discord
    working_dir: /usr/src/app
    volumes:
      - .:/usr/src/app
      - ~/.claude:/home/hivemind/.claude
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - server
    networks:
      - hivemind
    environment:
      - HIVE_MIND_SERVER_URL=http://server:8420
    command: ["/opt/venv/bin/python3", "discord_bot.py"]

  voice-server:
    build: .
    container_name: hive-mind-voice
    working_dir: /usr/src/app
    volumes:
      - .:/usr/src/app
    restart: unless-stopped
    networks:
      - hivemind
    environment:
      - WHISPER_MODEL=medium
      - KOKORO_VOICE=af_heart
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: ["/opt/venv/bin/python3", "voice_server.py"]

  telegram-bot:
    build: .
    container_name: hive-mind-telegram
    working_dir: /usr/src/app
    volumes:
      - .:/usr/src/app
      - ~/.claude:/home/hivemind/.claude
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - server
      - voice-server
    networks:
      - hivemind
    environment:
      - HIVE_MIND_SERVER_URL=http://server:8420
      - VOICE_SERVER_URL=http://voice-server:8422
    command: ["/opt/venv/bin/python3", "telegram_bot.py"]

networks:
  hivemind:
    driver: bridge

volumes:
  sessions-db:
