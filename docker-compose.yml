services:
  server:
    build: .
    container_name: hive-mind-server
    working_dir: /usr/src/app
    volumes:
      - ${HOST_PROJECT_DIR:-.}:/usr/src/app
      - ${HOST_MCP_DIR}:/usr/src/mcp
      - ${HOST_SPARK_DIR}:/usr/src/spark_to_bloom
      - ${HOST_CADDY_DIR}:/usr/src/caddy
    environment:
      - SESSIONS_DB_PATH=/usr/src/app/data/sessions.db
      - PYTHON_KEYRING_BACKEND=core.keyring_backend.HiveMindKeyring
      - PYTHONNOUSERSITE=1
      - KEY_RING=/usr/src/app/data/keyring
      - PYTHONPATH=/usr/src/app/vendor
    ports:
      - "8420:8420"
    restart: unless-stopped
    networks:
      - hivemind
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /home/hivemind:uid=1000,gid=1000
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    # Gateway server — other services connect to this
    command: ["/opt/venv/bin/python3", "server.py"]

  discord-bot:
    build: .
    container_name: hive-mind-discord
    working_dir: /usr/src/app
    volumes:
      - ${HOST_PROJECT_DIR:-.}:/usr/src/app
    restart: unless-stopped
    depends_on:
      - server
      - voice-server
    networks:
      - hivemind
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    environment:
      - HIVE_MIND_SERVER_URL=http://server:8420
      - VOICE_SERVER_URL=http://voice-server:8422
      - PYTHON_KEYRING_BACKEND=core.keyring_backend.HiveMindKeyring
      - PYTHONNOUSERSITE=1
      - KEY_RING=/usr/src/app/data/keyring
    command: ["/opt/venv/bin/python3", "-m", "clients.discord_bot"]

  voice-server:
    build:
      context: .
      dockerfile: Dockerfile.voice
    container_name: hive-mind-voice
    working_dir: /usr/src/app
    restart: always
    ports:
      - "8422:8422"
    networks:
      - hivemind
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ${HOST_PROJECT_DIR:-.}:/usr/src/app
      - whisper-cache:/home/hivemind/.cache
    environment:
      - WHISPER_MODEL=medium
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: ["/opt/venv/bin/python3", "-m", "voice.voice_server"]

  telegram-bot:
    build: .
    container_name: hive-mind-telegram
    working_dir: /usr/src/app
    volumes:
      - ${HOST_PROJECT_DIR:-.}:/usr/src/app
    restart: unless-stopped
    depends_on:
      - server
      - voice-server
    networks:
      - hivemind
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    environment:
      - HIVE_MIND_SERVER_URL=http://server:8420
      - VOICE_SERVER_URL=http://voice-server:8422
      - PYTHON_KEYRING_BACKEND=core.keyring_backend.HiveMindKeyring
      - PYTHONNOUSERSITE=1
      - KEY_RING=/usr/src/app/data/keyring
      - MIND_ID=ada
    command: ["/opt/venv/bin/python3", "-m", "clients.telegram_bot"]

  telegram-bot-2:
    build: .
    container_name: hive-mind-telegram-2
    working_dir: /usr/src/app
    volumes:
      - ${HOST_PROJECT_DIR:-.}:/usr/src/app
    restart: unless-stopped
    depends_on:
      - server
      - voice-server
    networks:
      - hivemind
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    environment:
      - HIVE_MIND_SERVER_URL=http://server:8420
      - VOICE_SERVER_URL=http://voice-server:8422
      - PYTHON_KEYRING_BACKEND=core.keyring_backend.HiveMindKeyring
      - PYTHONNOUSERSITE=1
      - KEY_RING=/usr/src/app/data/keyring
      - MIND_ID=ada
      - TELEGRAM_BOT_TOKEN_KEYRING_KEY=TELEGRAM_BOT_TOKEN_2
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN_2}
    command: ["/opt/venv/bin/python3", "-m", "clients.telegram_bot"]

  nagatha-bot:
    build: .
    container_name: hive-mind-nagatha-bot
    working_dir: /usr/src/app
    volumes:
      - ${HOST_PROJECT_DIR:-.}:/usr/src/app
    restart: unless-stopped
    depends_on:
      - server
      - voice-server
    networks:
      - hivemind
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    environment:
      - HIVE_MIND_SERVER_URL=http://server:8420
      - VOICE_SERVER_URL=http://voice-server:8422
      - PYTHON_KEYRING_BACKEND=core.keyring_backend.HiveMindKeyring
      - PYTHONNOUSERSITE=1
      - KEY_RING=/usr/src/app/data/keyring
      - MIND_ID=nagatha
      - TELEGRAM_BOT_TOKEN_KEYRING_KEY=HIVEMIND_TELEGRAM_BOT_TOKEN
    command: ["/opt/venv/bin/python3", "-m", "clients.telegram_bot"]

  scheduler:
    build: .
    container_name: hive-mind-scheduler
    working_dir: /usr/src/app
    volumes:
      - ${HOST_PROJECT_DIR:-.}:/usr/src/app
    restart: unless-stopped
    depends_on:
      - server
      - voice-server
    networks:
      - hivemind
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    environment:
      - HIVE_MIND_SERVER_URL=http://server:8420
      - VOICE_SERVER_URL=http://voice-server:8422
      - PYTHON_KEYRING_BACKEND=core.keyring_backend.HiveMindKeyring
      - PYTHONNOUSERSITE=1
      - KEY_RING=/usr/src/app/data/keyring
    command: ["/opt/venv/bin/python3", "-m", "clients.scheduler"]

  remote-admin:
    build: .
    container_name: hive-mind-remote-admin
    working_dir: /usr/src/app
    restart: unless-stopped
    networks:
      - hivemind
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    environment:
      - REMOTE_ADMIN_TOKEN=${REMOTE_ADMIN_TOKEN}
      - PYTHON_KEYRING_BACKEND=core.keyring_backend.HiveMindKeyring
      - PYTHONNOUSERSITE=1
    ports:
      - "8430:8430"
    volumes:
      - ${HOST_PROJECT_DIR:-.}:/usr/src/app:ro
    command: ["/opt/venv/bin/python3", "services/remote_admin.py"]

  planka-db:
    image: postgres:14-alpine
    container_name: hive-mind-planka-db
    restart: unless-stopped
    networks:
      - hivemind
    environment:
      - POSTGRES_DB=planka
      - POSTGRES_USER=planka
      - POSTGRES_PASSWORD=${PLANKA_DB_PASSWORD:-planka}
    volumes:
      - planka-db:/var/lib/postgresql/data

  planka:
    image: ghcr.io/plankanban/planka:latest
    container_name: hive-mind-planka
    restart: unless-stopped
    depends_on:
      - planka-db
    networks:
      - hivemind
    environment:
      - BASE_URL=${PLANKA_BASE_URL:-http://localhost:3000}
      - DATABASE_URL=postgresql://planka:${PLANKA_DB_PASSWORD:-planka}@planka-db/planka
      - SECRET_KEY_BASE=${PLANKA_SECRET_KEY_BASE}
      - DEFAULT_ADMIN_EMAIL=${PLANKA_ADMIN_EMAIL:-admin@hivemind.local}
      - DEFAULT_ADMIN_PASSWORD=${PLANKA_ADMIN_PASSWORD:-changeme}
      - DEFAULT_ADMIN_NAME=${PLANKA_ADMIN_NAME:-Admin}
      - DEFAULT_ADMIN_USERNAME=${PLANKA_ADMIN_USERNAME:-admin}
    ports:
      - "3000:1337"
    volumes:
      - planka-data:/app/public/user-avatars
      - planka-data:/app/public/project-background-images
      - planka-data:/app/private/attachments

